[project]
name = "smart-budget-openenv"
version = "0.1.0"
description = "OpenEnv environment for financial transaction classification"
authors = [
    {name = "Pooja"}
]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "requests"
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"